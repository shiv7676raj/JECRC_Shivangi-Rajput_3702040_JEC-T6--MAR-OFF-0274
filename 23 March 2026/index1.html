<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hold to Show Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .input-group {
      display: flex;
      align-items: center;
    }
    input {
      padding: 10px;
      width: 200px;
    }
    button {
      margin-left: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Password</h2>
  <div class="input-group">
    <input type="password" id="password" placeholder="Enter password">
    <button id="eyeBtn">👁️</button>
  </div>
</div>

<script>
  const pwd = document.getElementById("password");
  const eyeBtn = document.getElementById("eyeBtn");

  // Show password while holding
  eyeBtn.addEventListener("mousedown", () => {
    pwd.type = "text";
  });

  // Hide when released
  eyeBtn.addEventListener("mouseup", () => {
    pwd.type = "password";
  });

  // Also hide if mouse leaves button while holding
  eyeBtn.addEventListener("mouseleave", () => {
    pwd.type = "password";
  });

  // For mobile (touch support)
  eyeBtn.addEventListener("touchstart", () => {
    pwd.type = "text";
  });

  eyeBtn.addEventListener("touchend", () => {
    pwd.type = "password";
  });
</script>

</body>
</html>
